<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload de Arquivos</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #1e1e1e;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 850px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .card {
            background: #2d2d2d;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 0 15px rgba(0,0,0,.3);
        }

        h2 {
            text-align: center;
            color: #4fc3f7;
            margin-bottom: 20px;
        }

        input[type=file] {
            width: 100%;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #2196f3;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: .2s;
        }

        button:hover {
            background: #1976d2;
        }

        .status {
            margin-top: 20px;
            min-height: 30px;
            text-align: center;
            font-weight: bold;
        }

        .loading {
            width: 24px;
            height: 24px;
            margin: auto;
            border: 4px solid #666;
            border-top: 4px solid #4fc3f7;
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }

        @keyframes spin {

            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }

        }

        .success {
            color: #5cff7d;
        }

        .error {
            color: #ff5f5f;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="card">

        <h2>Markdown (.md)</h2>

        <input
            type="file"
            id="markdown"
            accept=".md,.markdown">

        <button onclick="uploadMarkdown()">
            Enviar Markdown
        </button>

        <div
            id="statusMarkdown"
            class="status">
        </div>

    </div>

    <div class="card">

        <h2>ZIP / RAR</h2>

        <input
            type="file"
            id="zip"
            accept=".zip,.rar">

        <button onclick="uploadZip()">
            Enviar Arquivo
        </button>

        <div
            id="statusZip"
            class="status">
        </div>

    </div>

</div>

<script>

async function uploadMarkdown(){

    const arquivo = document.getElementById("markdown").files[0];

    if(!arquivo){
        alert("Selecione um arquivo.");
        return;
    }

    const status = document.getElementById("statusMarkdown");

    status.innerHTML = '<div class="loading"></div>';

    const form = new FormData();

    form.append("arquivo", arquivo);

    try{

        const resposta = await fetch("/api/upload/mk",{
            method:"POST",
            body:form
        });

        if(!resposta.ok)
            throw new Error();

        status.innerHTML = '<span class="success">Arquivo enviado.</span>';

    }catch{

        status.innerHTML = '<span class="error">Erro ao enviar.</span>';

    }

}

async function uploadZip(){

    const arquivo = document.getElementById("zip").files[0];

    if(!arquivo){
        alert("Selecione um arquivo.");
        return;
    }

    const status = document.getElementById("statusZip");

    status.innerHTML = '<div class="loading"></div>';

    const form = new FormData();

    form.append("arquivo", arquivo);

    try{

        const resposta = await fetch("/api/upload/zip",{
            method:"POST",
            body:form
        });

        if(!resposta.ok)
            throw new Error();

        status.innerHTML = '<span class="success">Arquivo enviado.</span>';

    }catch{

        status.innerHTML = '<span class="error">Erro ao enviar.</span>';

    }

}

</script>

</body>
</html>
